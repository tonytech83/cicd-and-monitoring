name: Task Manager Frontend

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
on:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'services/frontend/**'
  workflow_dispatch:

jobs:
  lint:
    uses: ./.gitea/workflows/ui/1-lint.yaml

  test:
    needs: lint
    uses: ./.gitea/workflows/ui/2-test.yaml

  build:
    needs: test
    uses: ./.gitea/workflows/ui/3-build.yaml

  deploy:
    needs: build
    uses: ./.gitea/workflows/ui/4-change.yaml
    secrets: inherit
